<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hotel Booking UI</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <div class="navbar">
        <div class="logo">StayEasy</div>
        <nav>
            <a href="#">Home</a>
            <a href="#">Hotels</a>
            <a href="#">Offers</a>
            <a href="#">Contact</a>
        </nav>
        <button class="login">Login</button>
    </div>
</header>

<section class="hero">
    <div class="hero-content">
        <h1>Find Your Perfect Stay</h1>
        <p>Search hotels, resorts & homes</p>

        <div class="search-box">
            <input type="text" placeholder="Location">
            <input type="date">
            <input type="date">
            <button>Search</button>
        </div>
    </div>
</section>

<section class="hotels">

    <div class="card">
        <img src="https://images.unsplash.com/photo-1542314831-068cd1dbfeeb">
        <h3>Sea View Resort</h3>
        <p>Goa, India</p>
        <h4>₹3,500 / night</h4>
        <button>Book Now</button>
    </div>

    <div class="card">
        <img src="https://images.unsplash.com/photo-1551882547-ff40c63fe5fa">
        <h3>Mountain Escape</h3>
        <p>Manali, India</p>
        <h4>₹4,200 / night</h4>
        <button>Book Now</button>
    </div>

    <div class="card">
        <img src="https://images.unsplash.com/photo-1501117716987-c8e1ecb2101d?auto=format&fit=crop&w=800&q=80">
        <h3>Luxury Hotel</h3>
        <p>Mumbai, India</p>
        <h4>₹6,000 / night</h4>
        <button>Book Now</button>
    </div>

</section>

<footer>
    <p>© 2026 StayEasy Hotels</p>
</footer>

</body>
</html>
